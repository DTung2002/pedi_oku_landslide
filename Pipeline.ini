PIPELINE HOÀN CHỈNH
Bước 0 — Kiểm tra hệ tọa độ & tương thích

Mục đích: đảm bảo mọi dữ liệu cùng CRS và không bị lệch.

DEM và mask cần có CRS (hoặc cùng “đang nằm đúng vị trí”).

Slip curves phải là tọa độ bản đồ thật (x,y) trùng hệ với DEM.

Nếu DEM/mask có CRS khác hoặc pixel grid khác nhau: bạn sẽ reproject/resample mask về grid slip surface ở bước clip.

