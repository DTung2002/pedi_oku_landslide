Mục đích: tránh điểm quá dày trên line làm Kriging bị “nghiêng theo tuyến”, và giảm chi phí tính toán.

Ví dụ: chỉ giữ mỗi 1 m theo chainage.

Kết quả: tập điểm thưa hơn nhưng vẫn giữ hình dạng tổng.

