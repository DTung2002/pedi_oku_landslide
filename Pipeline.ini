Bước 7 — Clip slip surface theo mask vùng khảo sát

Mục đích: paper thường chỉ vẽ trong phạm vi khảo sát, không theo convex hull.

Quy trình clip đúng:

Reproject/resample mask về đúng grid của slip surface (nearest)

Áp mask: ngoài vùng khảo sát → NoData

(Optional) crop bbox để file gọn

Xuất file:

slip_surface_kriging_masked.tif

Bước 8 — Vẽ contour lines (step = 5 m) từ slip surface masked

Mục đích: tạo contour “liền mạch, sạch” chỉ trong vùng khảo sát.

Đọc slip_surface_kriging_masked.tif

Tạo levels theo step = 5 m (từ min/max thật của vùng mask)

Vẽ contour bằng matplotlib.contour (hoặc GDAL/QGIS Contour)

Không cần DEM có đúng giá trị 5/10/15… vì contour nội suy giữa pixel.

Pipeline code (bản rút gọn theo đúng các bước)

Bạn có thể triển khai theo 3 script/module:

Script A — Build slip surface (Kriging)

đọc JSON → decimate → sample DEM → depth → variogram → kriging → slip_surface_kriging.tif

Script B — Clip theo mask

slip_surface_kriging.tif + landslide_mask.tif → slip_surface_kriging_masked.tif

Script C — Plot contour

đọc slip_surface_kriging_masked.tif → contour(step=5)