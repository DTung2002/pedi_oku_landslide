Bước 5 — Tạo grid nội suy slip surface (thường là “convex hull” của dữ liệu)

Mục đích: không nội suy cả DEM (quá lớn), chỉ nội suy quanh vùng có dữ liệu.

Tạo convex hull từ toàn bộ điểm slip

